<!DOCTYPE html>
<html>
<head>
    <title>My AI Chatbot</title>
</head>
<body>
    <h1>My AI Chatbot</h1>

    <div id="chat-box" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>

    <input type="text" id="user-input">
    <button onclick="sendMessage()">Send</button>

   <script>
async function sendMessage() {
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const userMessage = input.value;

    if (!userMessage) return;

    // Show user message
    chatBox.innerHTML += "<div><b>You:</b> " + userMessage + "</div>";

    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMessage })
    });

    const data = await response.json();

    // Show bot reply
    chatBox.innerHTML += "<div><b>Bot:</b> " + data.response + "</div>";

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
